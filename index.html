<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean – Expiry & Code Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfb',
              100: '#ccfbf1',
              500: '#32bfa3',
              600: '#23a088',
              700: '#115e50',
              900: '#0d4a3e',
            },
            accent: {
              50: '#fff7f5',
              100: '#ffeedb',
              500: '#ff7c54',
              600: '#e5643d',
              800: '#9a3412',
            },
            danger: '#e63946',
            warning: '#f4a261',
            success: '#2a9d8f',
          }
        }
      }
    }
  </script>
  <style>
    body {
      overscroll-behavior-y: contain;
      -webkit-tap-highlight-color: transparent;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .badge-scaduto { background:#fde8e8; color:#c53030; border:1px solid #fecaca; }
    .badge-oggi { background:#ffedd5; color:#c2410c; border:1px solid #fed7aa; }
    .badge-domani { background:#fef3c7; color:#b45309; border:1px solid #fde68a; }
    .badge-3giorni { background:#fef9c3; color:#a16207; border:1px solid #fef08a; }
    .badge-7giorni { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .badge-30giorni { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .badge-normale { background:#f0f9ff; color:#1e40af; border:1px solid #bae6fd; }

    .product-card { transition: all 0.2s ease; }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }

    /* Pulsante centrale fotocamera (FAB) */
    .scan-fab {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #32bfa3, #23a088);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 25px rgba(50,191,163,0.4);
      transition: all 0.2s;
      z-index: 50;
      border: 4px solid white;
      cursor: pointer;
    }
    .scan-fab:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 8px 30px rgba(50,191,163,0.5); }
    .scan-fab i { color: white; width: 28px; height: 28px; }

    /* Navigazione inferiore */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: white;
      border-top: 1px solid #e2e8f0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
      padding: 8px 16px;
      padding-bottom: 20px;
      display: flex;
      justify-content: space-around;
      z-index: 40;
    }
    .bottom-nav button {
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      font-weight: 500;
      color: #94a3b8;
      transition: color 0.2s;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 12px;
    }
    .bottom-nav button.active { color: #32bfa3; background: #f0fdfb; }
    .bottom-nav button i { width: 22px; height: 22px; }

    /* Schermata scanner */
    #scanner-reader { width: 100%; aspect-ratio: 4/3; background: black; border-radius: 16px; overflow: hidden; }
    .chart-container { position: relative; height: 200px; width: 100%; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 24px; padding: 20px;
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
      animation: scaleIn 0.2s ease;
    }
    @keyframes scaleIn { from { transform: scale(0.95); } to { transform: scale(1); } }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <!-- Header -->
  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg">
        <i data-lucide="scan" class="w-6 h-6"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-slate-900 flex items-center gap-1.5">
          Scan Ean
          <span id="premium-badge" class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full font-medium border border-slate-200">Premium</span>
        </h1>
        <p class="text-[10px] text-slate-500 font-medium">Scansione e gestione scadenze</p>
      </div>
    </div>
    <div class="flex gap-2 items-center">
      <button onclick="openBackupModal()" class="p-2 hover:bg-slate-100 rounded-lg transition" title="Backup">
        <i data-lucide="download" class="w-5 h-5 text-slate-500"></i>
      </button>
      <div class="text-center px-2 py-0.5 bg-brand-50 border border-brand-100 rounded-md">
        <div id="totalHeaderBadge" class="text-xs font-bold text-brand-600">0</div>
        <div class="text-[8px] uppercase text-brand-500 font-bold">In dispensa</div>
      </div>
    </div>
  </header>

  <!-- Pulsante centrale fotocamera (sempre visibile) -->
  <div class="scan-fab" onclick="goToScan()">
    <i data-lucide="camera"></i>
  </div>

  <!-- Contenuto principale -->
  <main class="flex-1 overflow-y-auto pb-36 px-4 pt-4 no-scrollbar">

    <!-- DASHBOARD -->
    <section id="tab-dashboard" class="space-y-4 fade-in">
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-brand-600" id="dashTotProdotti">0</div>
          <div class="text-xs text-slate-500">Totale</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-brand-600" id="dashCategorie">0</div>
          <div class="text-xs text-slate-500">Categorie</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-orange-500" id="dashInScadenza">0</div>
          <div class="text-xs text-slate-500">In scadenza</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-red-500" id="dashScaduti">0</div>
          <div class="text-xs text-slate-500">Scaduti</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-slate-500" id="dashConsumati">0</div>
          <div class="text-xs text-slate-500">Consumati</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-red-400" id="dashButtati">0</div>
          <div class="text-xs text-slate-500">Buttati</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center col-span-2 sm:col-span-1">
          <div class="text-2xl font-bold text-purple-600" id="dashSpreco">0%</div>
          <div class="text-xs text-slate-500">Spreco</div>
        </div>
      </div>

      <div class="bg-white rounded-xl p-4 border border-slate-100 shadow-sm">
        <h3 class="text-sm font-bold text-slate-700 mb-2">📅 Scadenze prossime</h3>
        <div class="chart-container">
          <canvas id="expiryChart"></canvas>
        </div>
      </div>

      <div id="expiringList" class="space-y-2"></div>
    </section>

    <!-- PRODOTTI -->
    <section id="tab-products" class="space-y-4 fade-in hidden">
      <div class="flex flex-wrap gap-2">
        <div class="flex-1 min-w-[140px] relative">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
          <input type="text" id="searchInput" oninput="renderProducts()" placeholder="Cerca nome, marca, EAN..." class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-brand-500 shadow-sm">
        </div>
        <select id="filterCategory" onchange="renderProducts()" class="bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-sm shadow-sm">
          <option value="all">Tutte</option>
          <option value="Frigorifero">❄️ Frigorifero</option>
          <option value="Dispensa">🌾 Dispensa</option>
          <option value="Congelatore">🧊 Congelatore</option>
          <option value="Casa e Farmaci">💊 Casa e Farmaci</option>
        </select>
        <select id="sortOrder" onchange="renderProducts()" class="bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-sm shadow-sm">
          <option value="nome">Nome</option>
          <option value="scadenza">Scadenza</option>
          <option value="recente">Più recenti</option>
          <option value="quantita">Quantità</option>
        </select>
      </div>

      <div id="productsList" class="space-y-2"></div>
    </section>

    <!-- SCANNER (viene attivato da goToScan) -->
    <section id="tab-scan" class="hidden space-y-4 fade-in">
      <div class="bg-white rounded-2xl overflow-hidden border border-slate-200 shadow-sm">
        <div id="scanner-reader"></div>
      </div>
      <div class="flex justify-center">
        <button onclick="stopScanner()" class="px-6 py-2.5 bg-white border border-slate-200 rounded-xl font-semibold text-sm text-slate-600 shadow-sm hover:bg-slate-50">
          Ferma scansione
        </button>
      </div>
      <div id="scanResult" class="text-center text-sm font-semibold text-brand-600"></div>
    </section>

    <!-- STATISTICHE -->
    <section id="tab-stats" class="space-y-4 hidden">
      <div class="bg-white rounded-xl p-4 border border-slate-100 shadow-sm">
        <h3 class="text-sm font-bold text-slate-700 mb-2">📊 Categorie più usate</h3>
        <div class="chart-container"><canvas id="categoryChart"></canvas></div>
      </div>
      <div class="bg-white rounded-xl p-4 border border-slate-100 shadow-sm">
        <h3 class="text-sm font-bold text-slate-700 mb-2">📈 Storico mensile</h3>
        <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
      </div>
    </section>

    <!-- STORICO -->
    <section id="tab-history" class="space-y-4 hidden">
      <div id="historyList" class="space-y-2"></div>
    </section>

  </main>

  <!-- Navigazione inferiore -->
  <nav class="bottom-nav">
    <button onclick="switchTab('dashboard')" class="active" data-tab="dashboard">
      <i data-lucide="layout-dashboard"></i>
      <span>Dashboard</span>
    </button>
    <button onclick="switchTab('products')" data-tab="products">
      <i data-lucide="package"></i>
      <span>Prodotti</span>
    </button>
    <button onclick="goToScan()" style="pointer-events:none; opacity:0; width:0; padding:0;"></button> <!-- spazio per il FAB -->
    <button onclick="switchTab('stats')"
