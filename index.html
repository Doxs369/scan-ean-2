<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Expiry & Code Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0fdfb', 100: '#ccfbf1', 500: '#32bfa3', 600: '#23a088', 700: '#115e50', 900: '#0d4a3e' }, accent: { 50: '#fff7f5', 100: '#ffeedb', 500: '#ff7c54', 600: '#e5643d', 800: '#9a3412' } } } } }
  </script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <!-- Header e altre sezioni rimangono invariate -->
  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg"><i data-lucide="scan" class="w-6 h-6"></i></div>
      <div><h1 class="text-lg font-bold tracking-tight text-slate-900">Scan Ean</h1></div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    <section id="view-add" class="space-y-4">
      <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        
        <!-- POSIZIONE CON PULSANTE + -->
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">Posizione</label>
          <div class="flex gap-2">
            <select id="form-category" class="flex-1 bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800">
              <option value="Frigorifero">Frigorifero</option>
              <option value="Dispensa" selected>Dispensa</option>
              <option value="Congelatore">Congelatore</option>
              <option value="Casa e Farmaci">Casa e Farmaci</option>
            </select>
            <button type="button" onclick="addNewCategoryUI()" class="bg-brand-50 border border-brand-100 px-4 rounded-xl text-brand-600 font-bold hover:bg-brand-100 transition-colors">+</button>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">Nome Prodotto *</label>
          <input type="text" id="form-name" placeholder="Nome del prodotto" class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-2.5 text-sm">
        </div>

        <button type="button" onclick="saveProduct()" class="w-full py-3 bg-brand-500 text-white rounded-xl text-sm font-bold">Salva</button>
      </div>
    </section>
  </main>

  <script>
    // Caricamento categorie all'avvio
    window.addEventListener('DOMContentLoaded', () => {
      loadCustomCategories();
      lucide.createIcons();
    });

    function loadCustomCategories() {
      const select = document.getElementById('form-category');
      const customCategories = JSON.parse(localStorage.getItem('scanean_custom_categories')) || [];
      customCategories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });
    }

    function addNewCategoryUI() {
      const newCat = prompt("Inserisci il nome della nuova categoria:");
      if (newCat && newCat.trim() !== "") {
        const name = newCat.trim();
        const select = document.getElementById('form-category');
        
        // Aggiungi all'HTML
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
        
        // Salva nel localStorage
        let customCategories = JSON.parse(localStorage.getItem('scanean_custom_categories')) || [];
        customCategories.push(name);
        localStorage.setItem('scanean_custom_categories', JSON.stringify(customCategories));
        
        // Seleziona la nuova categoria
        select.value = name;
      }
    }

    function saveProduct() {
      const category = document.getElementById('form-category').value;
      const name = document.getElementById('form-name').value;
      alert("Prodotto '" + name + "' salvato in: " + category);
    }
  </script>
</body>
</html>
