<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg"><i data-lucide="scan" class="w-6 h-6"></i></div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-slate-900">Scan Ean</h1>
        <p class="text-[10px] text-slate-500 font-medium">Gestione intelligente scadenze</p>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    <section id="view-dashboard" class="space-y-4">
      <div class="relative">
        <input type="text" id="search-input" oninput="renderProducts()" placeholder="Cerca..." class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm shadow-sm">
      </div>
      <div id="category-filters" class="flex gap-2 overflow-x-auto no-scrollbar py-1"></div>
      <div id="products-container" class="space-y-3"></div>
    </section>

    <section id="view-add" class="hidden space-y-4">
      <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        <input type="hidden" id="form-product-id">
        <div class="space-y-1.5"><label class="text-xs font-bold text-slate-500">Nome Prodotto</label><input type="text" id="form-name" class="w-full bg-slate-100 rounded-xl px-4 py-2.5 text-sm"></div>
        <div class="space-y-1.5"><label class="text-xs font-bold text-slate-500">Data Scadenza</label><input type="date" id="form-expiry" class="w-full bg-slate-100 rounded-xl px-4 py-2.5 text-sm"></div>
        <div class="flex gap-3">
          <button onclick="switchView('dashboard')" class="flex-1 py-3 bg-slate-100 rounded-xl text-xs font-bold">Annulla</button>
          <button onclick="saveProduct()" class="flex-1 py-3 bg-emerald-500 text-white rounded-xl text-xs font-bold">Salva</button>
        </div>
      </div>
    </section>

    <section id="view-stats" class="hidden space-y-4">
      <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        <h2 class="font-bold text-slate-900">Configurazione Scadenze</h2>
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1"><label class="text-[10px] uppercase font-bold text-yellow-600">Giorni Giallo</label><input type="number" id="days-yellow" value="6" class="w-full bg-slate-100 rounded-lg p-2 text-sm" onchange="updateSettings()"></div>
          <div class="space-y-1"><label class="text-[10px] uppercase font-bold text-red-600">Giorni Rosso</label><input type="number" id="days-red" value="3" class="w-full bg-slate-100 rounded-lg p-2 text-sm" onchange="updateSettings()"></div>
        </div>
        <button onclick="clearDatabase()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl text-xs font-bold">Resetta Database</button>
      </div>
    </section>
  </main>

  <nav class="bg-white fixed bottom-0 left-0 right-0 z-40 border-t flex justify-around py-3">
    <button onclick="switchView('dashboard')" class="text-brand-500"><i data-lucide="layout-grid"></i></button>
    <button onclick="resetForm(); switchView('add')" class="w-12 h-12 bg-brand-500 text-white rounded-full -translate-y-6"><i data-lucide="plus"></i></button>
    <button onclick="switchView('stats')" class="text-slate-400"><i data-lucide="settings"></i></button>
  </nav>

  <script>
    let products = [];
    let db;
    let settings = { yellow: 6, red: 3 };

    // Inizializzazione DB
    const request = indexedDB.open("ScanEanDB", 3);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("products", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadData(); };

    function getExpiryColor(expiryDate) {
      const today = new Date(); today.setHours(0,0,0,0);
      const target = new Date(expiryDate);
      const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));

      if (diffDays < 0) return 'border-l-black'; // Scaduto (Nero)
      if (diffDays <= settings.red) return 'border-l-red-500'; // Rosso
      if (diffDays <= settings.yellow) return 'border-l-yellow-400'; // Giallo
      return 'border-l-green-500'; // Verde
    }

    function renderProducts() {
      const container = document.getElementById('products-container');
      container.innerHTML = '';
      
      // Ordinamento per data
      const sorted = [...products].sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
      
      sorted.forEach(p => {
        const colorClass = getExpiryColor(p.expiry);
        const div = document.createElement('div');
        div.className = `bg-white p-4 rounded-xl border border-slate-100 border-l-4 ${colorClass} shadow-sm flex justify-between items-center`;
        div.innerHTML = `
          <div>
            <p class="text-sm font-bold">${p.name}</p>
            <p class="text-[10px] text-slate-400">Scade il: ${p.expiry}</p>
          </div>
          <button onclick="deleteProduct('${p.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2"></i></button>
        `;
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    function updateSettings() {
      settings.yellow = parseInt(document.getElementById('days-yellow').value);
      settings.red = parseInt(document.getElementById('days-red').value);
      localStorage.setItem('scanean_settings', JSON.stringify(settings));
      renderProducts();
    }

    function loadData() {
      const saved = localStorage.getItem('scanean_settings');
      if(saved) settings = JSON.parse(saved);
      document.getElementById('days-yellow').value = settings.yellow;
      document.getElementById('days-red').value = settings.red;
      
      db.transaction("products").objectStore("products").getAll().onsuccess = e => {
        products = e.target.result;
        renderProducts();
      };
    }

    function saveProduct() {
      const p = { 
        id: 'p_' + Date.now(), 
        name: document.getElementById('form-name').value,
        expiry: document.getElementById('form-expiry').value 
      };
      db.transaction("products", "readwrite").objectStore("products").put(p).onsuccess = () => {
        loadData();
        switchView('dashboard');
      };
    }

    function deleteProduct(id) {
      db.transaction("products", "readwrite").objectStore("products").delete(id).onsuccess = loadData;
    }

    function switchView(v) {
      document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
      document.getElementById('view-' + v).classList.remove('hidden');
    }

    function resetForm() { document.getElementById('form-name').value = ''; document.getElementById('form-expiry').value = ''; }
    
    function clearDatabase() {
        if(confirm("Vuoi cancellare tutto?")) {
            db.transaction("products", "readwrite").objectStore("products").clear().onsuccess = loadData;
        }
    }
  </script>
</body>
</html>
