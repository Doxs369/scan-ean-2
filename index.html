<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Expiry & Code Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0fdfb', 100: '#ccfbf1', 500: '#32bfa3', 600: '#23a088', 700: '#115e50', 900: '#0d4a3e' }, accent: { 50: '#fff7f5', 100: '#ffeedb', 500: '#ff7c54', 600: '#e5643d', 800: '#9a3412' } } } } }
  </script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg"><i data-lucide="scan" class="w-6 h-6"></i></div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-slate-900">Scan Ean</h1>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    <section id="view-add" class="space-y-4">
      <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        <h2 id="form-title" class="text-md font-bold text-slate-900 flex items-center gap-2">
          <i data-lucide="plus-circle" class="w-5 h-5 text-brand-500"></i> Dati Prodotto
        </h2>
        
        <input type="hidden" id="form-product-id" value="">

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">Posizione</label>
          <select id="form-category" onchange="checkCategorySelection(this.value)" class="w-full bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800">
            <option value="Frigorifero">Frigorifero</option>
            <option value="Dispensa" selected>Dispensa</option>
            <option value="Congelatore">Congelatore</option>
            <option value="Casa e Farmaci">Casa e Farmaci</option>
            <option value="add_new" class="font-bold text-brand-600">+ Aggiungi categoria...</option>
          </select>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">Nome Prodotto *</label>
          <input type="text" id="form-name" placeholder="Nome prodotto" class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-2.5 text-sm">
        </div>

        <button type="button" onclick="saveProduct()" class="w-full py-3 bg-brand-500 text-white rounded-xl text-sm font-bold">Salva</button>
      </div>
    </section>
  </main>

  <script>
    // Caricamento categorie all'avvio
    let customCategories = JSON.parse(localStorage.getItem('scanean_custom_categories')) || [];

    window.addEventListener('DOMContentLoaded', () => {
      const select = document.getElementById('form-category');
      customCategories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.insertBefore(option, select.querySelector('option[value="add_new"]'));
      });
      lucide.createIcons();
    });

    function checkCategorySelection(value) {
      if (value === 'add_new') {
        const newCat = prompt("Nome della nuova categoria:");
        if (newCat && newCat.trim() !== "") {
          addCategory(newCat.trim());
        } else {
          document.getElementById('form-category').value = 'Dispensa';
        }
      }
    }

    function addCategory(name) {
      customCategories.push(name);
      localStorage.setItem('scanean_custom_categories', JSON.stringify(customCategories));
      
      const select = document.getElementById('form-category');
      const option = document.createElement('option');
      option.value = name;
      option.textContent = name;
      select.insertBefore(option, select.querySelector('option[value="add_new"]'));
      select.value = name;
    }

    function saveProduct() {
      // Logica di salvataggio esistente...
      alert("Prodotto salvato nella categoria: " + document.getElementById('form-category').value);
    }
    
    lucide.createIcons();
  </script>
</body>
</html>
