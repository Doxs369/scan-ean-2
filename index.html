<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Ean</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .border-l-4 { border-left-width: 4px; }
  </style>
</head>
<body class="h-full text-slate-800">

  <!-- Header come da design -->
  <header class="bg-white px-4 py-4 border-b shadow-sm sticky top-0 z-40">
    <h1 class="font-bold text-lg">Dispensa</h1>
  </header>

  <main id="main-content" class="p-4 pb-24">
    <!-- Lista prodotti -->
    <div id="products-list" class="space-y-3"></div>
    
    <!-- Sezione impostazioni (nascosta di default) -->
    <div id="view-settings" class="hidden bg-white p-5 rounded-xl border mt-4">
      <h2 class="font-bold mb-4">Configura Soglie Giorni</h2>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-[10px] uppercase font-bold text-yellow-600">Giallo (entro gg)</label>
        <input type="number" id="cfg-yellow" value="6" class="w-full p-2 bg-slate-100 rounded-lg text-sm" onchange="saveSettings()"></div>
        <div><label class="text-[10px] uppercase font-bold text-red-600">Rosso (entro gg)</label>
        <input type="number" id="cfg-red" value="3" class="w-full p-2 bg-slate-100 rounded-lg text-sm" onchange="saveSettings()"></div>
      </div>
    </div>
  </main>

  <!-- Navbar originale con scanner centrale -->
  <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-50">
    <button onclick="showList()" class="text-brand-500"><i data-lucide="layout-grid"></i></button>
    <button onclick="alert('Scanner attivo')" class="w-14 h-14 bg-emerald-500 text-white rounded-full -translate-y-6 shadow-md border-4 border-slate-50 flex items-center justify-center">
      <i data-lucide="scan-line"></i>
    </button>
    <button onclick="showSettings()" class="text-slate-400"><i data-lucide="settings"></i></button>
  </nav>

  <script>
    let db, products = [];
    let settings = { yellow: 6, red: 3 };

    // Setup DB
    const req = indexedDB.open("ScanEanDB", 7);
    req.onupgradeneeded = e => e.target.result.createObjectStore("products", { keyPath: "id" });
    req.onsuccess = e => { db = e.target.result; loadAll(); };

    function getBorderColor(expiryDate) {
      const diff = (new Date(expiryDate) - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24);
      if (diff < 0) return 'border-l-black';        // Scaduto
      if (diff <= settings.red) return 'border-l-red-500';    // Rosso
      if (diff <= settings.yellow) return 'border-l-yellow-400'; // Giallo
      return 'border-l-green-500';      // Verde
    }

    function render() {
      const list = document.getElementById('products-list');
      list.innerHTML = '';
      // Ordinamento: dal più vicino (o scaduto) al più lontano
      const sorted = [...products].sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
      
      sorted.forEach(p => {
        const div = document.createElement('div');
        div.className = `bg-white p-4 rounded-xl border border-l-4 shadow-sm ${getBorderColor(p.expiry)}`;
        div.innerHTML = `<div class="flex justify-between items-center">
          <div><p class="font-bold text-sm">${p.name}</p><p class="text-[10px] text-slate-400">Scade il: ${p.expiry}</p></div>
          <button onclick="del('${p.id}')" class="text-slate-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>`;
        list.appendChild(div);
      });
      lucide.createIcons();
    }

    function loadAll() {
      const saved = localStorage.getItem('s_settings');
      if(saved) settings = JSON.parse(saved);
      db.transaction("products").objectStore("products").getAll().onsuccess = e => {
        products = e.target.result || [];
        render();
      };
    }

    function saveSettings() {
      settings.yellow = document.getElementById('cfg-yellow').value;
      settings.red = document.getElementById('cfg-red').value;
      localStorage.setItem('s_settings', JSON.stringify(settings));
      render();
    }

    function showList() { document.getElementById('products-list').classList.remove('hidden'); document.getElementById('view-settings').classList.add('hidden'); }
    function showSettings() { document.getElementById('products-list').classList.add('hidden'); document.getElementById('view-settings').classList.remove('hidden'); }
    function del(id) { db.transaction("products", "readwrite").objectStore("products").delete(id).onsuccess = loadAll; }
    
    lucide.createIcons();
  </script>
</body>
</html>
