<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dispensa Premium – Gestione Scadenze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfb',
              100: '#ccfbf1',
              500: '#32bfa3',
              600: '#23a088',
              700: '#115e50',
              900: '#0d4a3e',
            },
            accent: {
              50: '#fff7f5',
              100: '#ffeedb',
              500: '#ff7c54',
              600: '#e5643d',
              800: '#9a3412',
            },
            danger: '#e63946',
            warning: '#f4a261',
            success: '#2a9d8f',
            gray: '#6c757d',
          }
        }
      }
    }
  </script>
  <style>
    body {
      overscroll-behavior-y: contain;
      -webkit-tap-highlight-color: transparent;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animazioni */
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .slide-up { animation: slideUp 0.25s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .scale-in { animation: scaleIn 0.2s ease; }
    @keyframes scaleIn { from{transform:scale(0.95)} to{transform:scale(1)} }

    .badge-scaduto { background:#fde8e8; color:#c53030; border:1px solid #fecaca; }
    .badge-oggi { background:#ffedd5; color:#c2410c; border:1px solid #fed7aa; }
    .badge-domani { background:#fef3c7; color:#b45309; border:1px solid #fde68a; }
    .badge-3giorni { background:#fef9c3; color:#a16207; border:1px solid #fef08a; }
    .badge-7giorni { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .badge-30giorni { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .badge-normale { background:#f0f9ff; color:#1e40af; border:1px solid #bae6fd; }

    .product-card {
      transition: all 0.2s ease;
    }
    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    /* Grafici canvas */
    .chart-container {
      position: relative;
      height: 200px;
      width: 100%;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white;
      border-radius: 24px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: scaleIn 0.2s ease;
    }

    .tab-btn {
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #32bfa3;
      color: white;
      box-shadow: 0 4px 12px rgba(50,191,163,0.3);
    }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <!-- Header -->
  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg">
        <i data-lucide="package" class="w-6 h-6"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-slate-900 flex items-center gap-1.5">
          Dispensa Premium
        </h1>
        <p class="text-[10px] text-slate-500 font-medium">Gestione offline</p>
      </div>
    </div>
    <div class="flex gap-2 items-center">
      <button onclick="openBackupModal()" class="p-2 hover:bg-slate-100 rounded-lg transition" title="Backup / Ripristino">
        <i data-lucide="download" class="w-5 h-5 text-slate-500"></i>
      </button>
      <div class="text-center px-2 py-0.5 bg-brand-50 border border-brand-100 rounded-md">
        <div id="totalProductsBadge" class="text-xs font-bold text-brand-600">0</div>
        <div class="text-[8px] uppercase text-brand-500 font-bold">Prodotti</div>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="flex gap-1 px-4 py-2 bg-white border-b border-slate-100 shrink-0">
    <button onclick="switchTab('dashboard')" class="tab-btn active flex-1 py-2 px-3 rounded-lg text-xs font-semibold text-slate-500 hover:bg-slate-50 flex items-center justify-center gap-1">
      <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
    </button>
    <button onclick="switchTab('products')" class="tab-btn flex-1 py-2 px-3 rounded-lg text-xs font-semibold text-slate-500 hover:bg-slate-50 flex items-center justify-center gap-1">
      <i data-lucide="list" class="w-4 h-4"></i> Prodotti
    </button>
    <button onclick="switchTab('scan')" class="tab-btn flex-1 py-2 px-3 rounded-lg text-xs font-semibold text-slate-500 hover:bg-slate-50 flex items-center justify-center gap-1">
      <i data-lucide="scan" class="w-4 h-4"></i> Scansiona
    </button>
    <button onclick="switchTab('stats')" class="tab-btn flex-1 py-2 px-3 rounded-lg text-xs font-semibold text-slate-500 hover:bg-slate-50 flex items-center justify-center gap-1">
      <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Statistiche
    </button>
    <button onclick="switchTab('history')" class="tab-btn flex-1 py-2 px-3 rounded-lg text-xs font-semibold text-slate-500 hover:bg-slate-50 flex items-center justify-center gap-1">
      <i data-lucide="clock" class="w-4 h-4"></i> Storico
    </button>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto pb-32 px-4 pt-4 no-scrollbar">

    <!-- ===== DASHBOARD ===== -->
    <section id="tab-dashboard" class="space-y-4 fade-in">
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-brand-600" id="dashTotaleProdotti">0</div>
          <div class="text-xs text-slate-500">Totale Prodotti</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-brand-600" id="dashCategorie">0</div>
          <div class="text-xs text-slate-500">Categorie</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-orange-500" id="dashInScadenza">0</div>
          <div class="text-xs text-slate-500">In Scadenza</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-red-500" id="dashScaduti">0</div>
          <div class="text-xs text-slate-500">Scaduti</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-slate-500" id="dashConsumati">0</div>
          <div class="text-xs text-slate-500">Consumati</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center">
          <div class="text-2xl font-bold text-red-400" id="dashButtati">0</div>
          <div class="text-xs text-slate-500">Buttati</div>
        </div>
        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm text-center col-span-2 sm:col-span-1">
          <div class="text-2xl font-bold text-purple-600" id="dashSpreco">0%</div>
          <div class="text-xs text-slate-500">Spreco %</div>
        </div>
      </div>

      <!-- Grafico scadenze rapido -->
      <div class="bg-white rounded-xl p-4 border border-slate-100 shadow-sm">
        <h3 class="text-sm font-bold text-slate-700 mb-2">📅 Scadenze prossime</h3>
        <div class="chart-container">
          <canvas id="expiryChart"></canvas>
        </div>
      </div>
    </section>

    <!-- ===== PRODOTTI ===== -->
    <section id="tab-products" class="space-y-4 fade-in hidden">
      <!-- Filtri e ricerca -->
      <div class="flex flex-wrap gap-2">
        <div class="flex-1 min-w-[140px] relative">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
          <input type="text" id="productSearchInput" oninput="filterProducts()" placeholder="Cerca nome, marca, EAN..." class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-brand-500 shadow-sm">
        </div>
        <select id="filterCategory" onchange="filterProducts()" class="bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-sm shadow-sm">
          <option value="all">Tutte le categorie</option>
          <option value="Frigorifero">❄️ Frigorifero</option>
          <option value="Dispensa">🌾 Dispensa</option>
          <option value="Congelatore">🧊 Congelatore</option>
          <option value="Casa e Farmaci">💊 Casa e Farmaci</option>
        </select>
        <select id="sortOrder" onchange="filterProducts()" class="bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-sm shadow-sm">
          <option value="nome
