<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Ean</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 500: '#32bfa3' } } } } }
  </script>
</head>
<body class="h-full">

  <!-- HEADER -->
  <header class="bg-white px-4 py-4 border-b shadow-sm">
    <h1 class="font-bold text-lg">Dispensa</h1>
  </header>

  <!-- CONTENUTO (Qui viene caricata la lista) -->
  <main id="main-content" class="p-4 pb-24">
    <div id="products-list" class="space-y-3"></div>
  </main>

  <!-- NAVBAR ORIGINALE -->
  <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-50">
    <button onclick="window.location.reload()" class="text-brand-500"><i data-lucide="layout-grid"></i></button>
    <button onclick="alert('Scanner')" class="w-14 h-14 bg-brand-500 text-white rounded-full -translate-y-6 shadow-md border-4 border-slate-50 flex items-center justify-center">
      <i data-lucide="scan-line"></i>
    </button>
    <button onclick="alert('Impostazioni')" class="text-slate-400"><i data-lucide="settings"></i></button>
  </nav>

  <script>
    let db, products = [];
    let settings = { yellow: 6, red: 3 };

    const req = indexedDB.open("ScanEanDB", 5);
    req.onupgradeneeded = e => e.target.result.createObjectStore("products", { keyPath: "id" });
    req.onsuccess = e => { db = e.target.result; loadAll(); };

    function getBorderColor(expiryDate) {
      if (!expiryDate) return 'border-l-gray-300';
      const diff = (new Date(expiryDate) - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24);
      if (diff < 0) return 'border-l-black';
      if (diff <= settings.red) return 'border-l-red-500';
      if (diff <= settings.yellow) return 'border-l-yellow-400';
      return 'border-l-green-500';
    }

    function render() {
      const list = document.getElementById('products-list');
      list.innerHTML = '';
      
      // Ordinamento per data (più vicino prima)
      const sorted = [...products].sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
      
      sorted.forEach(p => {
        const div = document.createElement('div');
        div.className = `bg-white p-4 rounded-xl border border-l-4 shadow-sm ${getBorderColor(p.expiry)}`;
        div.innerHTML = `<div class="flex justify-between items-center">
          <div><p class="font-bold text-sm">${p.name || 'Prodotto senza nome'}</p><p class="text-[10px] text-slate-400">Scade il: ${p.expiry}</p></div>
          <button onclick="del('${p.id}')" class="text-slate-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>`;
        list.appendChild(div);
      });
      lucide.createIcons();
    }

    function loadAll() {
      db.transaction("products").objectStore("products").getAll().onsuccess = e => {
        products = e.target.result || [];
        render();
      };
    }

    function del(id) { 
      db.transaction("products", "readwrite").objectStore("products").delete(id).onsuccess = loadAll; 
    }

    lucide.createIcons();
  </script>
</body>
</html>
