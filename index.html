<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Expiry & Code Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfb',
              100: '#ccfbf1',
              500: '#32bfa3',
              600: '#23a088',
              700: '#115e50',
              900: '#0d4a3e',
            },
            accent: {
              50: '#fff7f5',
              100: '#ffeedb',
              500: '#ff7c54',
              600: '#e5643d',
              800: '#9a3412',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      overscroll-behavior-y: contain;
      -webkit-tap-highlight-color: transparent;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <div id="ad-banner" class="bg-gradient-to-r from-accent-50 via-white to-accent-50 py-1.5 px-4 text-center text-xs border-b border-accent-100 flex items-center justify-between z-50 shrink-0">
    <span class="text-accent-800 font-medium truncate">Sponsor: Risparmia il 20% sulla spesa con il codice SCANEAN20!</span>
    <button onclick="openPaypalModal()" class="bg-accent-500 text-white text-[10px] font-bold px-2 py-1 rounded hover:bg-accent-600 transition shadow-sm shrink-0">
      Rimuovi Ads (1.99€)
    </button>
  </div>

  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg">
        <i data-lucide="scan" class="w-6 h-6"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-slate-900 flex items-center gap-1.5">
          Scan Ean <span id="premium-badge" class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full font-medium border border-slate-200">Free</span>
        </h1>
        <p class="text-[10px] text-slate-500 font-medium">Scansione rapida e gestione scadenze</p>
      </div>
    </div>
    
    <div class="flex gap-2">
      <div class="text-center px-2 py-0.5 bg-red-50 border border-red-100 rounded-md">
        <div id="stat-expired" class="text-xs font-bold text-red-600">0</div>
        <div class="text-[8px] uppercase text-red-500 font-bold">In Dispensa</div>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    
    <section id="view-dashboard" class="space-y-4">
      <div class="relative">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input type="text" id="search-input" placeholder="Cerca per nome, marca o codice..." class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-brand-500 text-slate-800 placeholder-slate-400 shadow-sm">
      </div>

      <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
        <button onclick="filterCategory(event, 'all')" class="category-btn active px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all bg-brand-500 text-white shadow-sm">
          Tutti
        </button>
        <button onclick="filterCategory(event, 'Frigorifero')" class="category-btn px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all bg-white text-slate-600 border border-slate-200 hover:border-slate-300 shadow-sm">
          ❄️ Frigorifero
        </button>
        <button onclick="filterCategory(event, 'Dispensa')" class="category-btn px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all bg-white text-slate-600 border border-slate-200 hover:border-slate-300 shadow-sm">
          🌾 Dispensa
        </button>
        <button onclick="filterCategory(event, 'Congelatore')" class="category-btn px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all bg-white text-slate-600 border border-slate-200 hover:border-slate-300 shadow-sm">
          🧊 Congelatore
        </button>
        <button onclick="filterCategory(event, 'Casa e Farmaci')" class="category-btn px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all bg-white text-slate-600 border border-slate-200 hover:border-slate-300 shadow-sm">
          💊 Casa e Farmaci
        </button>
      </div>

      <div id="products-container" class="space-y-3"></div>
      
      <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 text-center">
        <div class="p-4 bg-white rounded-full text-slate-300 mb-3 border border-slate-100 shadow-sm">
          <i data-lucide="package-open" class="w-12 h-12 text-brand-500"></i>
        </div>
        <p class="text-sm font-semibold text-slate-700">Nessun prodotto registrato</p>
        <p class="text-xs text-slate-500 mt-1 max-w-[200px]">Usa il lettore per scansionare qualsiasi codice EAN o QR Code!</p>
      </div>
    </section>

    <section id="view-scan" class="hidden space-y-4">
      <div class="bg-white rounded-2xl overflow-hidden relative border border-slate-200 shadow-sm flex flex-col items-center justify-center min-h-[240px]">
        <div id="scanner-security-alert" class="hidden p-6 text-center space-y-3 z-10 absolute inset-0 bg-white flex flex-col items-center justify-center">
          <div class="p-3 bg-accent-50 rounded-full text-accent-500">
            <i data-lucide="shield-alert" class="w-8 h-8"></i>
          </div>
          <p class="text-xs font-bold text-slate-800">La fotocamera richiede HTTPS</p>
          <button onclick="switchView('add')" class="px-4 py-2 bg-brand-500 text-white rounded-xl text-xs font-semibold shadow-sm">
            Vai a Inserimento Manuale
          </button>
        </div>

        <div id="scanner-reader" class="w-full aspect-[4/3] bg-black"></div>
        <div class="absolute inset-0 border-2 border-brand-500/50 pointer-events-none rounded-2xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-56 h-36 border-2 border-dashed border-accent-500 rounded flex items-center justify-center pointer-events-none">
          <span class="text-[10px] bg-slate-900/90 text-white px-2 py-0.5 rounded font-mono font-bold">ALLINEA EAN / QR</span>
        </div>
      </div>

      <div class="flex gap-3">
        <button onclick="stopScanning(); resetForm(); switchView('add')" class="flex-1 py-3 bg-white border border-slate-200 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 text-slate-700 shadow-sm">
          <i data-lucide="keyboard" class="w-4 h-4 text-brand-500"></i> Inserisci manuale
        </button>
      </div>
    </section>

    <section id="view-add" class="hidden space-y-4">
      <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        <div class="flex justify-between items-center">
          <h2 class="text-md font-bold text-slate-900 flex items-center gap-2">
            <i data-lucide="plus-circle" class="w-5 h-5 text-brand-500"></i> Dati Prodotto
          </h2>
        </div>
        
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">Codice EAN / QR</label>
          <div class="flex gap-2">
            <input type="text" id="form-barcode" placeholder="EAN o QR" class="flex-1 bg-slate-100 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-mono text-slate-800">
            <button onclick="fetchProductInfo()" class="px-4 bg-brand-500 text-white rounded-xl text-xs font-semibold flex items-center gap-1 shadow-sm shrink-0">
              <i data-lucide="search" class="w-3.5 h-3.5"></i> Cerca
            </button>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">Foto Prodotto</label>
          <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-xs font-semibold text-slate-700 cursor-pointer transition">
              <i data-lucide="camera" class="w-4 h-4 text-brand-500"></i>
              <span>Scatta / Scegli Foto</span>
              <input type="file" id="form-image" accept="image/*" capture="environment" class="hidden" onchange="handleImageUpload(event)">
            </label>
            <div id="image-preview-container" class="hidden relative w-12 h-12 rounded-lg overflow-hidden border border-slate-200">
              <img id="image-preview" src="" class="w-full h-full object-cover">
              <button onclick="removeSelectedImage()" class="absolute inset-0 bg-black/40 flex items-center justify-center text-white opacity-0 hover:opacity-100 transition">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1.5 col-span-2">
            <label class="text-xs font-bold text-slate-500">Nome Prodotto *</label>
            <input type="text" id="form-name" placeholder="Nome del prodotto" class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800">
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500">Marca</label>
            <input type="text" id="form-brand" placeholder="Es. Barilla" class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800">
          </div>
          <div class="space-y-1.5
