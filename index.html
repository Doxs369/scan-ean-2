<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Cloud & Photo Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // CONFIGURAZIONE FIREBASE (Incollerai qui le tue chiavi quando sarai pronto)
    const firebaseConfig = {
      apiKey: "INSERISCI_QUI_IL_TUO_API_KEY",
      authDomain: "INSERISCI_QUI_IL_TUO_AUTH_DOMAIN",
      projectId: "INSERISCI_QUI_IL_TUO_PROJECT_ID",
      storageBucket: "INSERISCI_QUI_IL_TUO_STORAGE_BUCKET",
      messagingSenderId: "INSERISCI_QUI_IL_MESSAGING_SENDER_ID",
      appId: "INSERISCI_QUI_IL_TUO_APP_ID"
    };

    let db, auth;
    let isCloudActive = false;
    if (firebaseConfig.apiKey !== "INSERISCI_QUI_IL_TUO_API_KEY") {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      auth = firebase.auth();
      isCloudActive = true;
    }

    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0fdfb', 100: '#ccfbf1', 500: '#32bfa3', 600: '#23a088', 700: '#115e50', 900: '#0d4a3e' },
            accent: { 50: '#fff7f5', 100: '#ffeedb', 500: '#ff7c54', 600: '#e5643d', 800: '#9a3412' }
          }
        }
      }
    }
  </script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <div id="cloud-banner" class="bg-amber-500 text-white py-1 px-4 text-center text-[10px] font-bold z-50">
    Modalità Locale attiva. Le foto verranno salvate sul telefono finché non configuri Firebase.
  </div>

  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg">
        <i data-lucide="scan" class="w-6 h-6"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-slate-900">Scan Ean</h1>
        <p class="text-[10px] text-slate-500 font-medium flex items-center gap-1">
          <span id="cloud-indicator" class="w-2 h-2 rounded-full bg-red-500"></span>
          <span id="cloud-status-text">Uso Locale (Offline)</span>
        </p>
      </div>
    </div>
    
    <div class="flex gap-2">
      <div class="text-center px-2 py-0.5 bg-red-50 border border-red-100 rounded-md">
        <div id="stat-expired" class="text-xs font-bold text-red-600">0</div>
        <div class="text-[8px] uppercase text-red-500 font-bold">Scaduti</div>
      </div>
      <div class="text-center px-2 py-0.5 bg-accent-50 border border-accent-100 rounded-md">
        <div id="stat-warning" class="text-xs font-bold text-accent-600">0</div>
        <div class="text-[8px] uppercase text-accent-500 font-bold">In Scadenza</div>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    
    <section id="view-dashboard" class="space-y-4">
      <div class="relative">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input type="text" id="search-input" placeholder="Cerca prodotto o codice..." class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-brand-500 shadow-sm">
      </div>

      <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
        <button onclick="filterCategory(event, 'all')" class="category-btn active px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap bg-brand-500 text-white shadow-sm">
