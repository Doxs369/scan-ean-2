<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Ean - Gestione Scadenze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full bg-slate-50">

  <nav class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around z-50">
    <button onclick="switchView('list')" class="text-brand-500"><i data-lucide="layout-grid"></i></button>
    <button onclick="switchView('add')" class="bg-emerald-500 text-white p-3 rounded-full -mt-8"><i data-lucide="plus"></i></button>
    <button onclick="switchView('settings')" class="text-slate-400"><i data-lucide="settings"></i></button>
  </nav>

  <main class="p-4 pb-24">
    <section id="view-list" class="space-y-3">
      <h2 class="font-bold text-lg mb-4">Dispensa</h2>
      <div id="products-list" class="space-y-3"></div>
    </section>

    <section id="view-add" class="hidden space-y-4">
      <input type="text" id="form-name" placeholder="Nome Prodotto" class="w-full p-3 rounded-xl border">
      <input type="date" id="form-expiry" class="w-full p-3 rounded-xl border">
      <button onclick="saveProduct()" class="w-full bg-emerald-500 text-white p-3 rounded-xl font-bold">Salva</button>
    </section>

    <section id="view-settings" class="hidden space-y-4">
      <h2 class="font-bold">Configura Soglie Giorni</h2>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-[10px] uppercase font-bold text-yellow-600">Giallo (entro X gg)</label>
        <input type="number" id="cfg-yellow" value="6" class="w-full p-2 border rounded" onchange="saveSettings()"></div>
        <div><label class="text-[10px] uppercase font-bold text-red-600">Rosso (entro X gg)</label>
        <input type="number" id="cfg-red" value="3" class="w-full p-2 border rounded" onchange="saveSettings()"></div>
      </div>
    </section>
  </main>

  <script>
    let db, products = [];
    let settings = { yellow: 6, red: 3 };

    // Setup DB
    const req = indexedDB.open("ScanEanDB", 4);
    req.onupgradeneeded = e => e.target.result.createObjectStore("products", { keyPath: "id" });
    req.onsuccess = e => { db = e.target.result; loadAll(); };

    function getProductStyle(expiryDate) {
      const diff = (new Date(expiryDate) - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24);
      if (diff < 0) return 'border-l-black';        // Scaduto
      if (diff <= settings.red) return 'border-l-red-500';    // Rosso
      if (diff <= settings.yellow) return 'border-l-yellow-400'; // Giallo
      return 'border-l-green-500';      // Verde
    }

    function render() {
      const list = document.getElementById('products-list');
      list.innerHTML = '';
      
      // ORDINAMENTO: Il più vicino (o scaduto) per primo
      const sorted = [...products].sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
      
      sorted.forEach(p => {
        const div = document.createElement('div');
        div.className = `bg-white p-4 rounded-xl border border-l-4 shadow-sm ${getProductStyle(p.expiry)}`;
        div.innerHTML = `<div class="flex justify-between">
          <div><p class="font-bold text-sm">${p.name}</p><p class="text-[10px] text-slate-400">Scade il: ${p.expiry}</p></div>
          <button onclick="del('${p.id}')" class="text-slate-300"><i data-lucide="trash-2"></i></button>
        </div>`;
        list.appendChild(div);
      });
      lucide.createIcons();
    }

    function saveProduct() {
      const p = { id: 'p_'+Date.now(), name: document.getElementById('form-name').value, expiry: document.getElementById('form-expiry').value };
      db.transaction("products", "readwrite").objectStore("products").put(p).onsuccess = () => { loadAll(); switchView('list'); };
    }

    function loadAll() {
      const stored = localStorage.getItem('s_settings');
      if(stored) settings = JSON.parse(stored);
      document.getElementById('cfg-yellow').value = settings.yellow;
      document.getElementById('cfg-red').value = settings.red;
      
      db.transaction("products").objectStore("products").getAll().onsuccess = e => {
        products = e.target.result;
        render();
      };
    }

    function saveSettings() {
      settings.yellow = document.getElementById('cfg-yellow').value;
      settings.red = document.getElementById('cfg-red').value;
      localStorage.setItem('s_settings', JSON.stringify(settings));
      render();
    }

    function del(id) { db.transaction("products", "readwrite").objectStore("products").delete(id).onsuccess = loadAll; }
    function switchView(v) {
      document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
      document.getElementById('view-' + v).classList.remove('hidden');
    }
  </script>
</body>
</html>
