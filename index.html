<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 500: '#32bfa3' } } } } }
  </script>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50 dark:bg-slate-900 dark:text-slate-100">

  <header class="bg-white dark:bg-slate-800 p-4 flex justify-between items-center border-b dark:border-slate-700">
    <h1 class="text-lg font-bold">Scan Ean Pro</h1>
    <button onclick="toggleDarkMode()" class="p-2 bg-slate-200 dark:bg-slate-700 rounded-lg">
      <i data-lucide="moon" class="w-5 h-5"></i>
    </button>
  </header>

  <main class="flex-1 overflow-y-auto p-4 space-y-4">
    <!-- Filtri Rapidi -->
    <div class="flex gap-2 overflow-x-auto pb-2">
      <button onclick="setFilter('all')" class="px-4 py-2 bg-brand-500 text-white rounded-full text-xs font-bold">Tutti</button>
      <button onclick="setFilter('urgent')" class="px-4 py-2 bg-red-500 text-white rounded-full text-xs font-bold">In Scadenza (5gg)</button>
    </div>

    <div id="products-container" class="space-y-3"></div>
  </main>

  <script>
    let products = JSON.parse(localStorage.getItem('scanean_products')) || [];
    let isDarkMode = localStorage.getItem('theme') === 'dark';

    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      document.documentElement.classList.toggle('dark', isDarkMode);
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
    }

    function checkSmartCategory(name) {
      const lower = name.toLowerCase();
      if (lower.includes('latte') || lower.includes('yogurt') || lower.includes('bistecca')) return 'Frigorifero';
      return 'Dispensa';
    }

    function renderProducts(filter = 'all') {
      const container = document.getElementById('products-container');
      container.innerHTML = '';
      
      const now = new Date();
      const fiveDays = new Date();
      fiveDays.setDate(now.getDate() + 5);

      products.forEach(p => {
        const expiryDate = new Date(p.expiry);
        const isUrgent = expiryDate <= fiveDays;

        if (filter === 'urgent' && !isUrgent) return;

        const div = document.createElement('div');
        div.className = `p-4 rounded-xl border ${isUrgent ? 'border-red-500 bg-red-50 dark:bg-red-900/20' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`;
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <div>
              <p class="font-bold">${p.name} (x${p.qty || 1})</p>
              <p class="text-xs text-slate-500">Scadenza: ${p.expiry}</p>
            </div>
            <button onclick="consumeProduct('${p.id}')" class="p-2 bg-brand-500 text-white rounded-lg">Consuma</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function consumeProduct(id) {
      const index = products.findIndex(p => p.id === id);
      if (index > -1) {
        if ((products[index].qty || 1) > 1) {
          products[index].qty--;
        } else {
          products.splice(index, 1);
        }
        localStorage.setItem('scanean_products', JSON.stringify(products));
        renderProducts();
      }
    }

    // Inizializzazione
    if(isDarkMode) document.documentElement.classList.add('dark');
    renderProducts();
    
    // Alert scadenze all'avvio
    window.onload = () => {
      const urgentCount = products.filter(p => new Date(p.expiry) <= new Date(Date.now() + 5*86400000)).length;
      if(urgentCount > 0) alert(`Attenzione: hai ${urgentCount} prodotti in scadenza!`);
    };

    lucide.createIcons();
  </script>
</body>
</html>
