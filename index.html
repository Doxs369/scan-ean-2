<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0fdfb', 500: '#32bfa3', 600: '#23a088' }, accent: { 500: '#ff7c54', 800: '#9a3412' } } } } }
  </script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .expiry-alert { border-color: #f97316 !important; background-color: #fff7ed; }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg"><i data-lucide="scan" class="w-6 h-6"></i></div>
      <div>
        <h1 class="text-lg font-bold text-slate-900">Scan Ean</h1>
        <p class="text-[10px] text-slate-500 font-medium">Gestione intelligente</p>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    <section id="view-dashboard" class="space-y-4">
      <div id="products-container" class="space-y-3"></div>
      <div id="empty-state" class="hidden text-center py-16"><p class="text-sm text-slate-500">Nessun prodotto</p></div>
    </section>
  </main>

  <nav class="bg-white fixed bottom-0 left-0 right-0 z-40 border-t border-slate-200 flex items-center justify-around py-3 px-6 shadow-sm">
    <button onclick="renderProducts()" class="flex flex-col items-center gap-1 text-brand-500">
      <i data-lucide="layout-grid" class="w-5 h-5"></i>
      <span class="text-[9px] font-bold">Dispensa</span>
    </button>
  </nav>

  <script>
    let products = JSON.parse(localStorage.getItem('scanean_products')) || [];

    function isExpiringSoon(dateStr) {
      const expiry = new Date(dateStr);
      const today = new Date();
      const diffTime = expiry - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays <= 3 && diffDays >= 0;
    }

    function renderProducts() {
      const container = document.getElementById('products-container');
      container.innerHTML = '';
      
      // Ordinamento: Data più vicina per prima
      const sortedProducts = [...products].sort((a, b) => new Date(a.expiry) - new Date(b.expiry));

      sortedProducts.forEach(p => {
        const expiring = isExpiringSoon(p.expiry);
        const div = document.createElement('div');
        div.className = `bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between gap-3 ${expiring ? 'expiry-alert' : ''}`;
        
        div.innerHTML = `
          <div class="flex-1 min-w-0">
            <span class="text-sm font-bold block truncate">${p.name} ${expiring ? '<i data-lucide="alert-triangle" class="inline w-3 h-3 text-orange-500"></i>' : ''}</span>
            <p class="text-[10px] text-brand-600 font-bold">Scadenza: ${p.expiry}</p>
          </div>
          <button onclick="consumeProduct('${p.id}')" class="p-2 bg-brand-50 text-brand-600 rounded-lg"><i data-lucide="check" class="w-4 h-4"></i></button>
        `;
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    function consumeProduct(id) {
      products = products.filter(p => p.id !== id);
      localStorage.setItem('scanean_products', JSON.stringify(products));
      renderProducts();
    }

    window.addEventListener('DOMContentLoaded', renderProducts);
  </script>
</body>
</html>
