<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dispensa Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f4f6fb;
            color: #1a1a2e;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        /* Scrollbar elegante */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c4c4c4; border-radius: 10px; }

        /* Layout base */
        .app-container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.05); position: relative; overflow: hidden; }

        /* Header */
        .header {
            background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
            color: white;
            padding: 20px 20px 30px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(45,106,79,0.3);
            transition: all 0.3s;
        }
        .header h1 { font-size: 1.8em; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
        .header p { font-size: 0.95em; opacity: 0.85; }
        .header .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .header .badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .header .badge .num { font-weight: 700; font-size: 1.1em; }

        /* Navigazione a tab */
        .nav-tabs {
            display: flex;
            background: #f8f9fd;
            border-radius: 16px;
            margin: -16px 16px 16px;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            position: relative;
            z-index: 2;
        }
        .nav-tabs button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85em;
            color: #7a7a9a;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-tabs button.active {
            background: white;
            color: #2d6a4f;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .nav-tabs button i { display: block; margin-bottom: 2px; font-size: 1.2em; }

        /* Contenitore schermate */
        .screen {
            display: none;
            padding: 16px;
            animation: fadeIn 0.35s ease;
        }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Card */
        .card {
            background: white;
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-header h3 { font-size: 1.1em; font-weight: 600; color: #1a1a2e; }

        /* Pulsanti */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white;
            box-shadow: 0 4px 12px rgba(45,106,79,0.3);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(45,106,79,0.4); }
        .btn-secondary {
            background: #f0f0f5;
            color: #2d6a4f;
        }
        .btn-secondary:hover { background: #e4e4ee; }
        .btn-danger {
            background: #e63946;
            color: white;
            box-shadow: 0 4px 12px rgba(230,57,70,0.25);
        }
        .btn-sm { padding: 8px 16px; font-size: 0.85em; border-radius: 10px; }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; color: #555; font-size: 0.9em; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8ef;
            border-radius: 14px;
            font-size: 1em;
            background: #fafafe;
            transition: border 0.2s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #2d6a4f; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        /* Chips e badge */
        .chip {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
            background: #e8f5e9;
            color: #2d6a4f;
            margin: 3px;
        }
        .chip.red { background: #fde8e8; color: #c62828; }
        .chip.yellow { background: #fff8e1; color: #f57f17; }
        .chip.gray { background: #ececec; color: #555; }
        .chip.green { background: #e8f5e9; color: #2e7d32; }

        /* Lista prodotti */
        .product-list { list-style: none; }
        .product-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f5;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .product-item:last-child { border-bottom: none; }
        .product-item:hover { background: #f9f9fd; border-radius: 12px; padding-left: 8px; padding-right: 8px; }
        .product-icon {
            width: 48px; height: 48px;
            background: #e3f2fd;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            flex-shrink: 0;
        }
        .product-info { flex: 1; }
        .product-info h4 { font-size: 1em; font-weight: 600; margin-bottom: 2px; }
        .product-info p { font-size: 0.8em; color: #777; }
        .product-qty {
            font-weight: 700;
            font-size: 1.2em;
            color: #2d6a4f;
            min-width: 36px;
            text-align: center;
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white;
            border-radius: 28px;
            padding: 24px;
            width: 100%;
            max-width: 440px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-box h2 { font-size: 1.5em; font-weight: 700; margin-bottom: 16px; }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            padding: 0 4px;
        }

        /* Statistiche e grafici */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #f8f9fd;
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            border: 1px solid #eeeef4;
        }
        .stat-card .stat-value { font-size: 1.8em; font-weight: 700; color: #2d6a4f; }
        .stat-card .stat-label { font-size: 0.75em; color: #888; margin-top: 4px; }

        canvas { max-width: 100%; height: auto; border-radius: 12px; margin-top: 8px; }

        /* Filtri */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 14px;
            border: 2px solid #e0e0e8;
            border-radius: 12px;
            font-size: 0.9em;
            background: white;
            flex: 1;
            min-width: 80px;
        }

        /* Ricerca */
        .search-box {
            background: #f5f6fa;
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            flex: 1;
            font-size: 1em;
            padding: 8px 0;
        }
        .search-box i { color: #aaa; font-size: 1.2em; }

        /* Animazioni extra */
        .fade-in { animation: fadeIn 0.4s ease; }
        .slide-up { animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* Responsive */
        @media (max-width: 480px) {
            .app-container { max-width: 100%; box-shadow: none; }
            .header { border-radius: 0; }
        }

        /* Icone (usiamo caratteri unicode per evitare dipendenze) */
        .icon { font-style: normal; }
    </style>
</head>
<body>

    <div class="nav-tabs" id="navTabs">
        <button data-screen="dashboard" class="active"><i>📊</i> Dashboard</button>
        <button data-screen="products"><i>📋</i> Prodotti</button>
        <button data-screen="stats"><i>📈</i> Statistiche</button>
        <button data-screen="settings"><i>⚙️</i> Impostazioni</button>
