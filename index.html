<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Expiry & Code Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hidden { display: none; }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg"><i data-lucide="scan" class="w-6 h-6"></i></div>
      <div><h1 class="text-lg font-bold tracking-tight text-slate-900">Scan Ean</h1></div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    <!-- DASHBOARD -->
    <section id="view-dashboard" class="space-y-4">
      <h2 class="text-sm font-bold text-slate-600">La tua Dispensa</h2>
      <div id="products-container" class="space-y-3"></div>
    </section>

    <!-- AGGIUNTA PRODOTTO -->
    <section id="view-add" class="hidden space-y-4">
      <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">Posizione</label>
          <div class="flex gap-2">
            <select id="form-category" class="flex-1 bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800">
              <option value="Frigorifero">Frigorifero</option>
              <option value="Dispensa" selected>Dispensa</option>
              <option value="Congelatore">Congelatore</option>
              <option value="Casa e Farmaci">Casa e Farmaci</option>
            </select>
            <button type="button" onclick="addNewCategoryUI()" class="bg-brand-50 border border-brand-100 px-4 rounded-xl text-brand-600 font-bold hover:bg-brand-100">+</button>
          </div>
        </div>
        <input type="text" id="form-name" placeholder="Nome Prodotto" class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-2.5 text-sm">
        <button type="button" onclick="saveProduct()" class="w-full py-3 bg-brand-500 text-white rounded-xl text-sm font-bold">Salva</button>
        <button type="button" onclick="switchView('dashboard')" class="w-full py-2 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold">Annulla</button>
      </div>
    </section>
  </main>

  <nav class="bg-white fixed bottom-0 left-0 right-0 z-40 border-t border-slate-200 flex items-center justify-around py-3 px-6">
    <button onclick="switchView('dashboard')" class="text-brand-500"><i data-lucide="layout-grid"></i></button>
    <button onclick="switchView('add')" class="bg-brand-500 text-white p-4 rounded-full -translate-y-4"><i data-lucide="plus"></i></button>
  </nav>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      loadCustomCategories();
      switchView('dashboard'); // Forza avvio su Dashboard
      lucide.createIcons();
    });

    function switchView(viewId) {
      document.getElementById('view-dashboard').classList.add('hidden');
      document.getElementById('view-add').classList.add('hidden');
      
      const active = document.getElementById('view-' + viewId);
      if (active) active.classList.remove('hidden');
    }

    function loadCustomCategories() {
      const select = document.getElementById('form-category');
      const cats = JSON.parse(localStorage.getItem('scanean_custom_categories')) || [];
      cats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function addNewCategoryUI() {
      const name = prompt("Inserisci nuova posizione:");
      if (name && name.trim()) {
        const select = document.getElementById('form-category');
        const opt = document.createElement('option');
        opt.value = name.trim(); opt.textContent = name.trim();
        select.appendChild(opt);
        
        let cats = JSON.parse(localStorage.getItem('scanean_custom_categories')) || [];
        cats.push(name.trim());
        localStorage.setItem('scanean_custom_categories', JSON.stringify(cats));
        select.value = name.trim();
      }
    }

    function saveProduct() {
      alert("Prodotto salvato in: " + document.getElementById('form-category').value);
      switchView('dashboard');
    }
  </script>
</body>
</html>
