<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden bg-slate-50">

  <header class="bg-white sticky top-0 z-40 px-4 py-3 flex items-center justify-between border-b border-slate-100 shadow-sm shrink-0">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-brand-100 text-brand-600 rounded-lg"><i data-lucide="scan" class="w-6 h-6"></i></div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-slate-900">Scan Ean</h1>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 no-scrollbar">
    <section id="view-dashboard" class="space-y-4">
      <div id="products-container" class="space-y-3"></div>
    </section>
  </main>

  <nav class="bg-white fixed bottom-0 left-0 right-0 z-40 border-t flex justify-around py-3">
    <button onclick="window.location.reload()" class="text-brand-500"><i data-lucide="refresh-cw"></i></button>
  </nav>

  <script>
    let db, products = [];

    // Inizializzazione Database
    const req = indexedDB.open("ScanEanDB", 8);
    req.onupgradeneeded = e => e.target.result.createObjectStore("products", { keyPath: "id" });
    req.onsuccess = e => { db = e.target.result; loadAll(); };

    function getExpiryColor(expiryDate) {
      const today = new Date(); today.setHours(0,0,0,0);
      const target = new Date(expiryDate);
      const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));

      if (diffDays < 0) return 'border-l-black';        // Scaduto (Nero)
      if (diffDays <= 3) return 'border-l-red-500';      // Rosso (entro 3gg)
      if (diffDays <= 6) return 'border-l-yellow-400';   // Giallo (entro 6gg)
      return 'border-l-green-500';                       // Verde (lontano)
    }

    function renderProducts() {
      const container = document.getElementById('products-container');
      container.innerHTML = '';
      
      // Ordinamento: dal più vicino (scaduto) al più lontano
      const sorted = [...products].sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
      
      sorted.forEach(p => {
        const colorClass = getExpiryColor(p.expiry);
        const div = document.createElement('div');
        div.className = `bg-white p-4 rounded-xl border border-slate-100 border-l-4 ${colorClass} shadow-sm flex justify-between items-center`;
        div.innerHTML = `
          <div>
            <p class="text-sm font-bold">${p.name}</p>
            <p class="text-[10px] text-slate-400">Scade il: ${p.expiry}</p>
          </div>
          <button onclick="deleteProduct('${p.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2"></i></button>
        `;
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    function loadAll() {
      db.transaction("products").objectStore("products").getAll().onsuccess = e => {
        products = e.target.result || [];
        renderProducts();
      };
    }

    function deleteProduct(id) {
      db.transaction("products", "readwrite").objectStore("products").delete(id).onsuccess = loadAll;
    }

    lucide.createIcons();
  </script>
</body>
</html>
