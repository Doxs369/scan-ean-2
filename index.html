<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-50 text-slate-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Ean - Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-full flex flex-col bg-slate-50">

  <header class="bg-white sticky top-0 z-40 px-4 py-3 border-b shadow-sm">
    <h1 class="text-lg font-bold">Dispensa</h1>
  </header>

  <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4">
    <!-- Lista Prodotti -->
    <div id="products-container" class="space-y-3"></div>
    
    <!-- Form Inserimento (Esempio semplificato integrato) -->
    <div class="bg-white p-5 rounded-2xl border shadow-sm space-y-4 mt-4">
      <h2 class="font-bold text-sm">Aggiungi Prodotto</h2>
      <input type="text" id="form-name" placeholder="Nome prodotto" class="w-full bg-slate-100 rounded-lg p-2 text-sm">
      <input type="date" id="form-expiry" class="w-full bg-slate-100 rounded-lg p-2 text-sm">
      
      <!-- TENDINA NOTIFICA -->
      <label class="text-[10px] font-bold text-slate-500 uppercase">Avvisami giorni prima:</label>
      <select id="form-alert-days" class="w-full bg-slate-100 rounded-lg p-2 text-sm">
        <option value="1">1 giorno prima</option>
        <option value="3" selected>3 giorni prima</option>
        <option value="7">7 giorni prima</option>
        <option value="14">14 giorni prima</option>
      </select>
      
      <button onclick="saveProduct()" class="w-full bg-emerald-500 text-white py-2 rounded-lg font-bold text-sm">Salva</button>
    </div>
  </main>

  <script>
    let db, products = [];

    const req = indexedDB.open("ScanEanDB", 9);
    req.onupgradeneeded = e => e.target.result.createObjectStore("products", { keyPath: "id" });
    req.onsuccess = e => { db = e.target.result; loadAll(); };

    function getExpiryColor(p) {
      const today = new Date(); today.setHours(0,0,0,0);
      const target = new Date(p.expiry);
      const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
      const alertThreshold = parseInt(p.alertDays) || 3;

      if (diffDays < 0) return 'border-l-black';         // Scaduto
      if (diffDays <= 0) return 'border-l-red-600';      // Scade oggi
      if (diffDays <= alertThreshold) return 'border-l-red-500'; // Entro la soglia scelta
      return 'border-l-green-500';                       // Ok
    }

    function renderProducts() {
      const container = document.getElementById('products-container');
      container.innerHTML = '';
      
      [...products].sort((a, b) => new Date(a.expiry) - new Date(b.expiry)).forEach(p => {
        const div = document.createElement('div');
        div.className = `bg-white p-4 rounded-xl border border-slate-100 border-l-4 ${getExpiryColor(p)} shadow-sm flex justify-between items-center`;
        div.innerHTML = `
          <div>
            <p class="text-sm font-bold">${p.name}</p>
            <p class="text-[10px] text-slate-400">Scadenza: ${p.expiry} (Avviso a -${p.alertDays}gg)</p>
          </div>
          <button onclick="deleteProduct('${p.id}')" class="text-slate-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        `;
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    function saveProduct() {
      const p = {
        id: 'p_' + Date.now(),
        name: document.getElementById('form-name').value,
        expiry: document.getElementById('form-expiry').value,
        alertDays: document.getElementById('form-alert-days').value
      };
      if(!p.name || !p.expiry) return alert("Compila tutto!");
      
      db.transaction("products", "readwrite").objectStore("products").put(p).onsuccess = loadAll;
    }

    function loadAll() {
      db.transaction("products").objectStore("products").getAll().onsuccess = e => {
        products = e.target.result || [];
        renderProducts();
      };
    }

    function deleteProduct(id) {
      db.transaction("products", "readwrite").objectStore("products").delete(id).onsuccess = loadAll;
    }
  </script>
</body>
</html>
