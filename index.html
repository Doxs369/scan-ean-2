<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scan Ean</title>
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
        :root {
            --bg: #f0fdfb;
            --sec: #ccfbf1;
            --main: #32bfa3;
            --btn-sec: #23a088;
            --text: #115e50;
            --emph: #0d4a3e;
            --action: #ff7c54;
            --action-dark: #e5643d;
            --alert: #9a3412;
        }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        button { background: var(--main); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .secondary { background: var(--btn-sec); }
        .action { background: var(--action); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--sec); border-radius: 8px; }
        #scanner-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 1000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--sec); }
        .banner { background: #eee; padding: 20px; text-align: center; border-radius: 10px; margin: 10px 0; border: 2px dashed #ccc; }
    </style>
</head>
<body>

    <header><h1>Scan Ean</h1></header>

    <div id="app">
        <button onclick="openScanner()">📸 Apri Fotocamera</button>
        
        <div id="dashboard">
            <div class="card">
                <h3>Statistiche</h3>
                <p id="stats">Prodotti: 0 | Scaduti: 0</p>
            </div>
            <div class="banner">BANNER PUBBLICITARIO</div>
        </div>

        <div id="product-list"></div>
    </div>

    <div id="scanner-container">
        <video id="video"></video>
        <button style="position:absolute; bottom:20px;" onclick="stopScanner()">Chiudi</button>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('products') || '[]');
        let codeReader = new ZXing.BrowserMultiFormatReader();

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map((p, i) => `
                <div class="card" style="border-left: 5px solid ${getExpColor(p.date)}">
                    <h4>${p.name} (${p.brand})</h4>
                    <p>EAN: ${p.ean} | Qtà: ${p.qty}</p>
                    <p>Scadenza: ${p.date}</p>
                </div>
            `).join('');
            document.getElementById('stats').innerText = `Prodotti: ${products.length} | Scaduti: ${products.filter(p => new Date(p.date) < new Date()).length}`;
        }

        function getExpColor(date) {
            const diff = (new Date(date) - new Date()) / (1000 * 60 * 60 * 24);
            if (diff < 0) return '#9a3412';
            if (diff <= 3) return '#ff7c54';
            if (diff <= 7) return '#facc15';
            return '#32bfa3';
        }

        async function openScanner() {
            document.getElementById('scanner-container').style.display = 'block';
            try {
                const controls = await codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                    if (result) {
                        alert("Codice rilevato: " + result.text);
                        stopScanner();
                        // Qui si aprirebbe il form di inserimento
                    }
                });
            } catch (err) { console.error(err); }
        }

        function stopScanner() {
            codeReader.reset();
            document.getElementById('scanner-container').style.display = 'none';
        }

        render();
    </script>
</body>
</html>
